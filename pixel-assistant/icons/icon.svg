<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#08080f"/>
    </radialGradient>
    <radialGradient id="orb" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#b47aff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b0e8a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#7c3aed" stroke-width="3" opacity="0.3"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.4"/>
  <!-- Orb -->
  <circle cx="256" cy="256" r="130" fill="url(#orb)" filter="url(#glow)"/>
  <!-- P letter -->
  <text x="256" y="310" text-anchor="middle" fill="white" font-size="160" font-family="-apple-system, Arial, sans-serif" font-weight="900" opacity="0.95">P</text>
</svg>
