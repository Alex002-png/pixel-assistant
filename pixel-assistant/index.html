<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pixel">
  <title>Pixel</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Configuración</h2>
      <label>Tu nombre</label>
      <input type="text" id="user-name" placeholder="Ej: Alex" autocomplete="name">
      <label>DeepSeek API Key</label>
      <input type="password" id="api-key" placeholder="sk-..." autocomplete="off">
      <label>Idioma de reconocimiento de voz</label>
      <select id="voice-lang">
        <option value="es-MX">Español (México)</option>
        <option value="es-ES">Español (España)</option>
        <option value="en-US">English (US)</option>
      </select>
      <label>Brave Search API Key <span style="color:#4a5568;font-weight:400">(opcional — búsquedas web)</span></label>
      <input type="password" id="brave-key" placeholder="BSA..." autocomplete="off">
      <p class="modal-note" style="text-align:left;margin-top:4px;margin-bottom:0">Gratis en brave.com/search/api · 2000 búsquedas/mes</p>
      <button id="save-settings">Guardar</button>
      <p class="modal-note">Tu API key se guarda solo en este dispositivo</p>
    </div>
  </div>

  <!-- Notes Modal -->
  <div id="notes-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Mis Notas</h2>
        <button id="close-notes">✕</button>
      </div>
      <div id="notes-list"></div>
      <p class="modal-note" id="no-notes-msg">No hay notas guardadas aún.</p>
    </div>
  </div>

  <!-- Main App -->
  <div id="app">
    <header>
      <div class="logo">PIXEL</div>
      <div class="header-actions">
        <button id="notes-btn" aria-label="Notas">📋</button>
        <button id="settings-btn" aria-label="Configuración">⚙</button>
      </div>
    </header>

    <main>
      <div id="orb-container">
        <div id="orb" class="idle" role="button" aria-label="Toca para hablar">
          <div class="orb-ring ring-2"></div>
          <div class="orb-ring ring-1"></div>
          <div class="orb-core">
            <span class="orb-letter">P</span>
          </div>
        </div>
        <p id="orb-hint">Toca para hablar</p>
      </div>

      <div class="message-area">
        <div id="user-bubble" class="bubble user hidden">
          <span id="user-text"></span>
        </div>
        <div id="pixel-bubble" class="bubble pixel hidden">
          <span id="pixel-text"></span>
        </div>
      </div>

      <div class="text-input-area">
        <input type="text" id="text-input" placeholder="Escribe tu pregunta..." autocomplete="off" autocorrect="off">
        <button id="send-btn" aria-label="Enviar">↑</button>
      </div>
    </main>

    <footer>
      <div id="status">Listo</div>
    </footer>
  </div>

  <script src="js/memory.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
